<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de Times - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .pos-GOL { background: #ef4444; color: white; }
        .pos-ZAG { background: #3b82f6; color: white; }
        .pos-MEI { background: #22c55e; color: white; }
        .pos-ATA { background: #f59e0b; color: white; }
        .pos-LIB { background: #8b5cf6; color: white; }
        .pulse-ring { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div x-data="sorteioApp()" x-init="init()" class="pb-24">
        
        <header class="bg-green-600 p-4 sticky top-0 z-50 shadow-lg">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-white p-1.5 rounded-full"><span class="icon-trophy text-green-600"></span></div>
                    <h1 class="font-extrabold tracking-tight">ARENA SORTEIO</h1>
                </div>
                <div class="flex gap-2">
                    <button @click="showQR = true" class="bg-white/20 p-2 rounded-lg text-sm font-bold">QR CODE</button>
                </div>
            </div>
        </header>

        <div x-show="showQR" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4" x-cloak>
            <div @click.away="showQR = false" class="bg-white p-6 rounded-3xl text-center max-w-xs w-full text-slate-800">
                <h3 class="font-bold mb-4">Convidar Jogadores</h3>
                <img :src="qrCodeUrl" class="w-48 h-48 mx-auto mb-4 border-4 border-green-500 rounded-xl pulse-ring">
                <button @click="showQR = false" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">FECHAR</button>
            </div>
        </div>

        <main class="max-w-4xl mx-auto p-4 space-y-6">
            
            <div x-show="etapa === 'cadastro'" class="slide-up space-y-6">
                
                <button @click="showModalCadastro = true" class="w-full bg-green-500 hover:bg-green-400 py-4 rounded-2xl font-black text-xl shadow-xl shadow-green-500/20 transition-all">
                    ⚽ ENTRAR NA LISTA
                </button>

                <div class="grid grid-cols-2 gap-4 bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                    <div>
                        <label class="text-xs text-slate-400 block mb-1 uppercase font-bold">Nº de Times</label>
                        <div class="flex items-center gap-3">
                            <button @click="numeroTimes = Math.max(2, numeroTimes - 1)" class="bg-slate-700 w-8 h-8 rounded-lg">-</button>
                            <span class="font-bold text-xl" x-text="numeroTimes"></span>
                            <button @click="numeroTimes++" class="bg-slate-700 w-8 h-8 rounded-lg">+</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1 uppercase font-bold">Equilíbrio</label>
                        <select x-model="metodoSorteio" class="bg-slate-700 w-full p-2 rounded-lg text-sm outline-none">
                            <option value="equilibrado">Balanceado ★</option>
                            <option value="aleatorio">Aleatório 🎲</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <h2 class="font-bold text-slate-400 uppercase text-xs tracking-widest">Jogadores Inscritos (<span x-text="jogadores.length"></span>)</h2>
                        <button @click="jogadores = []" class="text-red-400 text-xs font-bold" x-show="jogadores.length > 0">LIMPAR TUDO</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        <template x-for="(jogador, index) in jogadores" :key="jogador.id">
                            <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center border border-white/5">
                                <div class="flex items-center gap-3">
                                    <div :class="'w-8 h-8 rounded-lg flex items-center justify-center font-bold text-[10px] pos-' + jogador.posicao" x-text="jogador.posicao"></div>
                                    <span class="font-semibold text-sm" x-text="jogador.nome"></span>
                                </div>
                                <button @click="jogadores.splice(index, 1)" class="text-slate-500 hover:text-white">✕</button>
                            </div>
                        </template>
                    </div>
                </div>

                <button x-show="jogadores.length >= (numeroTimes * 2)" @click="sortearTimes()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xl shadow-lg">
                    GERAR CONFRONTO ⚡
                </button>
            </div>

            <div x-show="etapa === 'resultado'" class="slide-up space-y-6">
                
                <div class="bg-white/5 rounded-2xl p-4 border border-white/10 overflow-x-auto">
                    <h3 class="font-bold mb-3 text-blue-400 text-xs uppercase tracking-widest">Resumo Técnico</h3>
                    <table class="w-full text-sm">
                        <template x-for="(time, index) in timesGerados">
                            <tr class="border-b border-white/5">
                                <td class="py-2 font-bold" x-text="'Time ' + (index + 1)"></td>
                                <td class="py-2 text-center text-slate-400" x-text="time.length + ' jogadores'"></td>
                                <td class="py-2 text-right font-bold text-yellow-500" x-text="(time.reduce((acc, j) => acc + parseInt(j.nivel), 0) / time.length).toFixed(1) + ' ★'"></td>
                            </tr>
                        </template>
                    </table>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <template x-for="(time, index) in timesGerados">
                        <div class="bg-slate-800/60 rounded-3xl overflow-hidden border border-white/10">
                            <div class="bg-green-600 p-3 flex justify-between">
                                <span class="font-black italic" x-text="'TIME ' + (index + 1)"></span>
                                <span class="text-xs opacity-80" x-text="time.filter(j => j.posicao === 'GOL').length + ' GOL'"></span>
                            </div>
                            <div class="p-3 space-y-2">
                                <template x-for="jogador in time">
                                    <div class="bg-white/5 p-2.5 rounded-xl flex justify-between items-center border border-white/5">
                                        <div class="flex items-center gap-3">
                                            <div :class="'w-7 h-7 rounded flex items-center justify-center font-bold text-[8px] pos-' + jogador.posicao" x-text="jogador.posicao"></div>
                                            <span class="text-sm font-bold uppercase" x-text="jogador.nome"></span>
                                        </div>
                                        <div class="text-[8px] text-yellow-500">
                                            <template x-for="i in parseInt(jogador.nivel)">★</template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>

        <div x-show="showModalCadastro" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4" x-cloak>
            <div class="bg-slate-800 p-6 rounded-3xl w-full max-w-sm space-y-4 border border-white/10">
                <h3 class="font-black text-xl">Novo Jogador</h3>
                <input x-model="novoJogador.nome" type="text" placeholder="Nome do Craque" class="w-full bg-slate-700 p-4 rounded-xl outline-none focus:ring-2 ring-green-500">
                
                <div class="grid grid-cols-2 gap-3">
                    <select x-model="novoJogador.posicao" class="bg-slate-700 p-3 rounded-xl text-sm">
                        <option value="GOL">🧤 Goleiro</option>
                        <option value="ZAG">🛡️ Zagueiro</option>
                        <option value="MEI">⚡ Meia</option>
                        <option value="ATA">🎯 Atacante</option>
                    </select>
                    <select x-model="novoJogador.nivel" class="bg-slate-700 p-3 rounded-xl text-sm">
                        <option value="1">⭐ Iniciante</option>
                        <option value="2">⭐⭐ Médio</option>
                        <option value="3">⭐⭐⭐ Pro</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button @click="showModalCadastro = false" class="flex-1 py-3 font-bold text-slate-400">CANCELAR</button>
                    <button @click="adicionarJogador()" class="flex-1 bg-green-500 py-3 rounded-xl font-bold">ADICIONAR</button>
                </div>
            </div>
        </div>

        <footer x-show="etapa === 'resultado'" class="fixed bottom-0 inset-x-0 p-4 bg-slate-900/90 backdrop-blur border-t border-white/10 flex gap-3">
            <button @click="etapa = 'cadastro'" class="flex-1 bg-slate-700 py-4 rounded-xl font-bold">VOLTAR</button>
            <button @click="copiarTimes()" class="flex-1 bg-green-600 py-4 rounded-xl font-bold">COPIAR WHATSAPP</button>
        </footer>
    </div>

    <script>
        function sorteioApp() {
            return {
                etapa: 'cadastro',
                showQR: false,
                showModalCadastro: false,
                jogadores: JSON.parse(localStorage.getItem('jogadores') || '[]'),
                numeroTimes: 2,
                metodoSorteio: 'equilibrado',
                novoJogador: { nome: '', nivel: '2', posicao: 'MEI' },
                timesGerados: [],
                qrCodeUrl: `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`,

                init() {
                    this.$watch('jogadores', val => localStorage.setItem('jogadores', JSON.stringify(val)));
                },

                adicionarJogador() {
                    if (!this.novoJogador.nome.trim()) return;
                    this.jogadores.push({ ...this.novoJogador, id: Date.now() });
                    this.novoJogador = { nome: '', nivel: '2', posicao: 'MEI' };
                    this.showModalCadastro = false;
                },

                sortearTimes() {
                    let lista = [...this.jogadores].sort(() => Math.random() - 0.5);
                    
                    if (this.metodoSorteio === 'equilibrado') {
                        lista.sort((a, b) => b.nivel - a.nivel);
                    }

                    const novosTimes = Array.from({ length: this.numeroTimes }, () => []);
                    
                    // Distribuição Serpente (Garante equilíbrio técnico)
                    lista.forEach((jogador, i) => {
                        const indexTime = i % this.numeroTimes;
                        const direcao = Math.floor(i / this.numeroTimes) % 2 === 0;
                        direcao ? novosTimes[indexTime].push(jogador) : novosTimes[this.numeroTimes - 1 - indexTime].push(jogador);
                    });

                    this.timesGerados = novosTimes;
                    this.etapa = 'resultado';
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                },

                copiarTimes() {
                    let texto = "⚽ *ARENA SORTEIO - ESCALAÇÕES* ⚽\n\n";
                    this.timesGerados.forEach((time, i) => {
                        texto += `*TIME ${i + 1}* (${time.length} Atletas)\n`;
                        time.forEach(j => texto += `• ${j.nome} [${j.posicao}]\n`);
                        texto += "\n";
                    });
                    navigator.clipboard.writeText(texto);
                    alert("Copiado! Basta colar no grupo.");
                }
            }
        }
    </script>
</body>
</html>
