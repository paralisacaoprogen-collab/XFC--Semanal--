<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Sorteio - Remoto Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .pos-GOL { background: #ef4444; } .pos-ZAG { background: #3b82f6; }
        .pos-MEI { background: #22c55e; } .pos-ATA { background: #f59e0b; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="sorteioApp()">

    <header class="bg-green-600 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-extrabold italic text-xl">ARENA SORTEIO</h1>
            <div class="flex gap-2">
                <span class="text-[10px] bg-black/20 px-2 py-1 rounded font-bold" x-text="jogadores.length + ' NO JOGO'"></span>
                <button @click="limparTudo()" class="text-[10px] bg-red-700 px-2 py-1 rounded font-bold uppercase">Zerar</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <div x-show="etapa === 'cadastro'" class="space-y-6">
            <button @click="showModalCadastro = true" class="w-full bg-green-500 py-4 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-transform">
                ⚽ ENTRAR NA LISTA
            </button>

            <div class="grid grid-cols-2 gap-4 bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Times</label>
                    <div class="flex items-center gap-3">
                        <button @click="numeroTimes = Math.max(2, numeroTimes - 1)" class="bg-slate-700 w-8 h-8 rounded-lg">-</button>
                        <span class="font-bold text-xl" x-text="numeroTimes"></span>
                        <button @click="numeroTimes++" class="bg-slate-700 w-8 h-8 rounded-lg">+</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1 font-bold uppercase">Equilíbrio</label>
                    <select x-model="metodoSorteio" class="bg-slate-700 w-full p-2 rounded-lg text-sm outline-none">
                        <option value="equilibrado">Balanceado ★</option>
                        <option value="aleatorio">Aleatório 🎲</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <template x-for="jogador in jogadores" :key="jogador.id">
                    <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center gap-3">
                            <div :class="'w-8 h-8 rounded-lg flex items-center justify-center font-bold text-[10px] pos-' + jogador.posicao" x-text="jogador.posicao"></div>
                            <div>
                                <div class="font-semibold text-sm flex items-center gap-1">
                                    <span x-text="jogador.nome"></span>
                                    <span x-show="jogador.tipo === 'mensalista'" class="text-yellow-500 text-[10px]">⭐</span>
                                </div>
                                <div class="text-[9px] text-slate-500 font-bold uppercase" x-text="jogador.tipo"></div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <button x-show="jogadores.length >= (numeroTimes * 2)" @click="sortearTimes()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xl">
                SORTEAR AGORA ⚡
            </button>
        </div>

        <div x-show="etapa === 'resultado'" class="grid grid-cols-1 md:grid-cols-2 gap-4" x-cloak>
            <template x-for="(time, index) in timesGerados">
                <div class="bg-slate-800/60 rounded-3xl overflow-hidden border border-white/10">
                    <div class="bg-green-600 p-3 font-black italic" x-text="'TIME ' + (index + 1)"></div>
                    <div class="p-3 space-y-2">
                        <template x-for="jogador in time">
                            <div class="bg-white/5 p-2 rounded-xl flex justify-between items-center text-sm">
                                <span class="font-bold uppercase" x-text="jogador.nome"></span>
                                <span class="text-[9px] opacity-50" x-text="jogador.posicao"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="showModalCadastro" class="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4" x-cloak>
        <div class="bg-slate-800 p-6 rounded-3xl w-full max-w-sm space-y-4 border border-white/10">
            <h3 class="font-black text-xl italic">NOVO JOGADOR</h3>
            <input x-model="novoJogador.nome" type="text" placeholder="Seu Nome" class="w-full bg-slate-700 p-4 rounded-xl outline-none ring-green-500 focus:ring-2">
            
            <div class="grid grid-cols-2 gap-2">
                <select x-model="novoJogador.posicao" class="bg-slate-700 p-3 rounded-xl text-sm">
                    <option value="GOL">Goleiro</option><option value="ZAG">Zagueiro</option>
                    <option value="MEI">Meio-Campo</option><option value="ATA">Atacante</option>
                </select>
                <select x-model="novoJogador.nivel" class="bg-slate-700 p-3 rounded-xl text-sm">
                    <option value="1">⭐ Básico</option><option value="2">⭐⭐ Médio</option>
                    <option value="3">⭐⭐⭐ Pro</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button @click="novoJogador.tipo = 'mensalista'" :class="novoJogador.tipo === 'mensalista' ? 'bg-yellow-600' : 'bg-slate-700'" class="py-3 rounded-xl text-[10px] font-bold">MENSALISTA</button>
                <button @click="novoJogador.tipo = 'visitante'" :class="novoJogador.tipo === 'visitante' ? 'bg-blue-600' : 'bg-slate-700'" class="py-3 rounded-xl text-[10px] font-bold">VISITANTE</button>
            </div>

            <div class="flex gap-2">
                <button @click="showModalCadastro = false" class="flex-1 text-slate-400 font-bold">FECHAR</button>
                <button @click="adicionarJogador()" class="flex-1 bg-green-500 py-3 rounded-xl font-bold italic">SALVAR</button>
            </div>
        </div>
    </div>

    <div x-show="showPixModal" class="fixed inset-0 bg-black/95 z-[70] flex items-center justify-center p-4" x-cloak>
        <div class="bg-slate-800 p-6 rounded-3xl w-full max-w-sm text-center space-y-6 border border-yellow-500">
            <h3 class="font-black text-xl text-yellow-500">PAGAMENTO PIX</h3>
            <p class="text-xs text-slate-400">Visitantes devem pagar R$ 15,00 para confirmar a vaga.</p>
            <div class="bg-black/40 p-4 rounded-xl break-all text-[10px] font-mono" x-text="pixCopiaECola"></div>
            <button @click="copiarPix()" class="w-full bg-slate-700 py-2 rounded-lg text-xs font-bold">COPIAR PIX</button>
            <button @click="confirmarPagamento()" class="w-full bg-green-600 py-4 rounded-2xl font-black italic">JÁ PAGUEI ✅</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO DO FIREBASE (SUBSTITUA PELOS SEUS DADOS)
        const firebaseConfig = {
            apiKey: "COLE_AQUI",
            authDomain: "COLE_AQUI",
            databaseURL: "COLE_AQUI",
            projectId: "COLE_AQUI",
            storageBucket: "COLE_AQUI",
            messagingSenderId: "COLE_AQUI",
            appId: "COLE_AQUI"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const jogadoresRef = ref(db, 'jogadores');

        window.sorteioApp = () => ({
            etapa: 'cadastro',
            showModalCadastro: false,
            showPixModal: false,
            jogadores: [],
            numeroTimes: 2,
            metodoSorteio: 'equilibrado',
            novoJogador: { nome: '', nivel: '2', posicao: 'MEI', tipo: 'mensalista' },
            timesGerados: [],
            pixCopiaECola: "00020101021126360014br.gov.bcb.pix011442180353000160520400005303986540515.005802BR5920ALMEIDA REPRESENTACO6009SAO PAULO62070503***630428BB",

            init() {
                onValue(jogadoresRef, (snap) => {
                    const data = snap.val();
                    this.jogadores = data ? Object.values(data) : [];
                });
            },

            async adicionarJogador() {
                if (this.novoJogador.tipo === 'visitante' && !this.showPixModal) {
                    this.showPixModal = true;
                    return;
                }
                const refNovo = push(jogadoresRef);
                await set(refNovo, { ...this.novoJogador, id: refNovo.key });
                this.showModalCadastro = this.showPixModal = false;
                this.novoJogador = { nome: '', nivel: '2', posicao: 'MEI', tipo: 'mensalista' };
            },

            confirmarPagamento() { this.adicionarJogador(); },
            copiarPix() { navigator.clipboard.writeText(this.pixCopiaECola); alert("PIX Copiado!"); },
            limparTudo() { if(confirm("Limpar lista de todos?")) remove(jogadoresRef); },

            sortearTimes() {
                let lista = [...this.jogadores].sort(() => Math.random() - 0.5);
                if (this.metodoSorteio === 'equilibrado') lista.sort((a, b) => b.nivel - a.nivel);
                
                const res = Array.from({ length: this.numeroTimes }, () => []);
                lista.forEach((j, i) => {
                    const tIdx = i % this.numeroTimes;
                    const zig = Math.floor(i / this.numeroTimes) % 2 === 0;
                    zig ? res[tIdx].push(j) : res[this.numeroTimes - 1 - tIdx].push(j);
                });
                this.timesGerados = res;
                this.etapa = 'resultado';
                confetti({ particleCount: 100 });
            }
        });
    </script>
</body>
</html>
